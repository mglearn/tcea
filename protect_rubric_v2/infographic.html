<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Infographic | PROTECT Rubric v2.0</title><link rel="stylesheet" href="css/styles.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script></head><body><div class="wrap"><header class="topbar no-print"><div class="brand"><div class="shield-mini">🛡️</div><span>PROTECT Rubric v2.0</span></div><nav class="nav"></nav></header><div class="toolbar no-print"><button id="pngBtn" class="btn primary">Download PNG</button><button id="infoPdfBtn" class="btn">Download PDF</button><a class="btn" href="report.html">Back to Report</a></div><main id="infographic" class="infographic"></main></div><script src="js/rubric.js"></script><script src="js/app.js"></script><script>
async function initInfo(){renderNav('infographic.html'); const rubric=await loadRubric(); const review=getReview(); const total=totalScore(review); const rec=recommendation(total); const pct=Math.round(total/14*100); const cats=rubric.categories.map(c=>{const row=review.categories?.[c.number]||{}; return `<div class="dot-card"><div class="small">${c.code}</div><div class="dot-score">${row.score||'—'}</div><div class="small">${c.name}</div></div>`}).join(''); const strengths=rubric.categories.filter(c=>Number(review.categories?.[c.number]?.score)===2).slice(0,3).map(c=>`<li>${c.name}</li>`).join('') || '<li>No score of 2 recorded yet.</li>'; const gaps=rubric.categories.filter(c=>Number(review.categories?.[c.number]?.score)<2).slice(0,3).map(c=>`<li>${c.name}: ${(review.categories?.[c.number]?.gaps||'Needs review.').split('\n')[0]}</li>`).join('') || '<li>No major gaps recorded.</li>'; document.getElementById('infographic').innerHTML=`<div class="report-head"><div><h1 style="font-size:3rem">PROTECT Rubric v2.0</h1><p class="subtitle">Student Data Privacy Results</p><p><strong>Vendor / Tool:</strong> ${escapeHtml(review.meta.vendor||'')}</p><p><strong>Reviewed:</strong> ${escapeHtml(review.meta.reviewDate||today())}</p></div><div style="text-align:right"><div class="score-total">${total}/14</div><div class="pill">${rec.label}</div></div></div>${review.ai?.used?'<p class="notice"><strong>AI-assisted draft:</strong> Human reviewer verification required.</p>':''}<div class="info-grid"><section><div class="hero-art" style="min-height:260px"><div class="big-shield" style="width:210px;height:245px"><div class="student"></div><div class="lock"></div></div></div><h2>Overall Score</h2><div class="meter"><div class="meter-fill" style="width:${pct}%"></div></div><p><strong>${pct}%</strong> privacy-readiness score based on the seven PROTECT categories.</p></section><section><h2>Category Scores</h2><div class="cat-dots">${cats}</div><div class="grid two" style="margin-top:18px"><div class="card soft"><h3>Top Strengths</h3><ul>${strengths}</ul></div><div class="card soft"><h3>Priority Gaps</h3><ul>${gaps}</ul></div></div></section></div><p class="small" style="margin-top:22px">Structured first impression only; not legal advice. Verify all evidence before approval.</p>`; document.getElementById('pngBtn').onclick=downloadPng; document.getElementById('infoPdfBtn').onclick=downloadInfoPdf; }
async function downloadPng(){const el=document.getElementById('infographic'); const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff'}); canvas.toBlob(b=>downloadFile('protect-results-infographic.png', b),'image/png');}
async function downloadInfoPdf(){const el=document.getElementById('infographic'); const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff'}); const img=canvas.toDataURL('image/png'); const {jsPDF}=window.jspdf; const pdf=new jsPDF({orientation:'landscape',unit:'pt',format:'letter'}); const w=pdf.internal.pageSize.getWidth(); const h=pdf.internal.pageSize.getHeight(); const ratio=Math.min(w/canvas.width,h/canvas.height); const iw=canvas.width*ratio, ih=canvas.height*ratio; pdf.addImage(img,'PNG',(w-iw)/2,(h-ih)/2,iw,ih); pdf.save('protect-results-infographic.pdf');}
initInfo();
</script></body></html>
