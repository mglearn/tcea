<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Report | PROTECT Rubric v2.0</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
</head>
<body>
<div class="wrap">
  <header class="topbar no-print">
    <div class="brand"><div class="shield-mini">🛡️</div><span>PROTECT Rubric v2.0</span></div>
    <nav class="nav"></nav>
  </header>
  <div class="toolbar no-print">
    <button id="mdBtn" class="btn">Download Markdown</button>
    <button id="jsonBtn" class="btn">Download JSON</button>
    <button id="csvBtn" class="btn">Download CSV</button>
    <button id="pdfBtn" class="btn primary">Download PDF</button>
    <button id="docxBtn" class="btn">Download DOCX</button>
    <a class="btn" href="infographic.html">Create Infographic</a>
  </div>
  <main id="reportView" class="card"></main>
  <footer class="footer">Structured first impression only; not legal advice.</footer>
</div>
<script src="js/rubric.js"></script>
<script src="js/app.js"></script>
<script src="js/exports.js"></script>
<script>
async function initReport(){
  renderNav('report.html');
  const rubric = await loadRubric();
  const review = getReview();
  const total = totalScore(review);
  const rec = recommendation(total);
  const rows = rubric.categories.map(c=>{
    const row = review.categories?.[c.number] || {};
    return `<tr><td>${c.number}</td><td><strong>${c.code} — ${c.name}</strong><br><span class="small">${escapeHtml(c.lookForShort)}</span></td><td>${escapeHtml(row.score||'')}</td><td>${escapeHtml(row.reason||'')}</td></tr>`;
  }).join('');

  document.getElementById('reportView').innerHTML = `
    <div class="report-head">
      <div>
        <h1 style="font-size:2.6rem">PROTECT Rubric v2.0 Report</h1>
        <p class="subtitle">Safeguarding Student Data Privacy</p>
        <p><strong>Vendor / Tool:</strong> ${escapeHtml(review.meta.vendor||'')}</p>
        <p><strong>Product URL:</strong> ${escapeHtml(review.meta.productUrl||'')}</p>
        <p><strong>Reviewer:</strong> ${escapeHtml(review.meta.reviewer||'')} ${review.meta.organization?`— ${escapeHtml(review.meta.organization)}`:''}</p>
        <p><strong>Review Date:</strong> ${escapeHtml(review.meta.reviewDate||'')}</p>
      </div>
      <div><div class="score-total">${total}/14</div><div class="pill">${rec.label}</div></div>
    </div>
    <h2>Score Summary</h2>
    <table>
      <tr><th>#</th><th>Category</th><th>Score</th><th>Auto-Scoring Note</th></tr>
      ${rows}
      <tr class="total-row"><td colspan="2">Total</td><td>${total}/14</td><td>${rec.label}</td></tr>
    </table>
    <h2>Documents Reviewed</h2>
    <p>${review.docs.allText || review.docs.privacyPolicy ? 'Combined vendor text pasted into the standalone review workspace.' : 'No vendor text was saved with this review.'}</p>
    <p class="small">This score is a structured first impression. A signed District Data Privacy Addendum, executed NDPA, and formal DPIA where required remain the binding compliance instruments.</p>`;

  document.getElementById('mdBtn').onclick = ()=>downloadFile(`${slugify(review.meta.vendor)}-protect-report.md`, reviewToMarkdown(review,rubric),'text/markdown');
  document.getElementById('jsonBtn').onclick = ()=>downloadFile(`${slugify(review.meta.vendor)}-protect-scorecard.json`, JSON.stringify(review,null,2),'application/json');
  document.getElementById('csvBtn').onclick = ()=>downloadFile(`${slugify(review.meta.vendor)}-protect-scorecard.csv`, reviewToCsv(review,rubric),'text/csv');
  document.getElementById('pdfBtn').onclick = ()=>exportPdf('reportView');
  document.getElementById('docxBtn').onclick = ()=>exportDocx(review,rubric);
}
initReport();
</script>
</body>
</html>
