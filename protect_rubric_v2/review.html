<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Review | PROTECT Rubric v2.0</title><link rel="stylesheet" href="css/styles.css"></head><body><div class="wrap"><header class="topbar"><div class="brand"><div class="shield-mini">🛡️</div><span>PROTECT Rubric v2.0</span></div><nav class="nav"></nav></header><main><section class="card"><h1 style="font-size:2.6rem">Review Workspace</h1><p class="lead">Paste documents, score each category, record evidence, and generate a defensible report.</p><div class="toolbar"><button id="saveBtn" class="btn primary">Save Draft</button><button id="aiBtn" class="btn warn">AI Draft Score</button><button id="reportBtn" class="btn">Generate Report</button><button id="clearBtn" class="btn danger">Clear Review</button><span id="liveTotal" class="pill">0/14</span></div><p id="aiHint" class="small"></p><div id="status" class="hidden"></div></section><section class="section card"><h2>Review Details</h2><div class="grid two"><div class="field"><label>Vendor / Tool Name</label><input id="vendor" placeholder="Example: Vendor Name"></div><div class="field"><label>Product URL</label><input id="productUrl" placeholder="https://"></div><div class="field"><label>Reviewer</label><input id="reviewer"></div><div class="field"><label>Organization</label><input id="organization"></div><div class="field"><label>Review Date</label><input id="reviewDate" type="date"></div></div></section><section class="section card"><h2>Documents</h2><div class="field"><label>Privacy Policy</label><textarea id="privacyPolicy" placeholder="Paste privacy policy text here..."></textarea></div><div class="field"><label>Terms of Service</label><textarea id="terms" placeholder="Paste terms of service text here..."></textarea></div><div class="field"><label>District Addendum / NDPA / Data Privacy Agreement</label><textarea id="addendum" placeholder="Optional but recommended..."></textarea></div><div
